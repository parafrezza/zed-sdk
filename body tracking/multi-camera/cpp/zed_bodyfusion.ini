; ZED multi-camera fusion runtime config
; Paths can be absolute or relative to this file.

[app]
verbose_logging = 1

[input]
calibration_file =

[publisher]
; Publisher-side body tracking format on each camera before Fusion.
depth_mode = neural
coordinate_units = meter
depth_stabilization = 30
positional_tracking_static = 1
detection_model = human_body_fast
body_format = 18
enable_body_fitting = 0
enable_tracking = 0
enable_segmentation = 0
allow_reduced_precision_inference = 1
runtime_detection_confidence = 40
runtime_skeleton_smoothing = 0.4
grab_confidence_threshold = 50

[fusion]
; Fused-body format expectation used as the default OSC format reference.
coordinate_system = right_handed_y_up
coordinate_units = meter
body_format = 18
working_resolution_width = 512
working_resolution_height = 360
enable_tracking = 1
enable_body_fitting = 1
minimum_keypoints = 7
minimum_cameras = 1
skeleton_smoothing = 0.4

[preview]
enabled = 1

[osc]
enabled = 1
ip = 192.168.10.160
port = 9001
use_bundle = 1
send_interval_ms = 40
only_tracked_bodies = 1
; auto = follow fused format, zed18/zed34/zed38 = remap to a fixed OSC contract when possible.
output_standard = zed18
log_messages = 0
log_file =